services:
  - type: web
    name: cuttrack
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cuttrack-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: cuttrack-db
    plan: free
